# Ollama ??????
ai:
  ollama:
    base-url: http://localhost:11434
    chat:
      model: qwen2.5:7b  # ???? qwen2.5:7b ? qwen2.5:14b?function calling ????
      options:
        temperature: 0.7
        max-tokens: 1000
    client:
      connect-timeout: 5s
      read-timeout: 30s
      max-attempts: 3
      backoff:
        initial-interval: 1s
        max-interval: 5s
        multiplier: 1.5

